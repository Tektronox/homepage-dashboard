<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>schelbert.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-prompt">~/</span><span class="logo-name">schelbert.dev</span>
      </div>
      <div class="header-meta">
        <span class="status-summary" id="status-summary"></span>
        <span class="last-updated" id="last-updated"></span>
      </div>
    </div>
  </header>

  <main>
    <section class="section" id="section-public">
      <h2 class="section-title"><span class="section-prefix">#</span> Projects &amp; Sites</h2>
      <div class="subsection">
        <div class="subsection-label">public</div>
        <div class="card-grid" id="grid-public"></div>
      </div>
      <div class="subsection">
        <div class="subsection-label">My stuff</div>
        <div class="card-grid" id="grid-internal"></div>
      </div>
    </section>

    <section class="section" id="section-links">
      <h2 class="section-title"><span class="section-prefix">#</span> Resources</h2>
      <div class="link-list" id="list-links"></div>
    </section>

    <section class="section" id="section-services">
      <h2 class="section-title"><span class="section-prefix">#</span> Services</h2>
      <div class="service-list" id="list-services"></div>
    </section>
  </main>

  <footer>
    <span>schelbert.dev &mdash; built with intent</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
